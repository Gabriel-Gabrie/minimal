<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migration Test - Budget App</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        h1 { color: #10b981; }
        h2 { color: #3b82f6; margin-top: 30px; }
        .section {
            background: #2a2a2a;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            border: 1px solid #404040;
        }
        .pass { color: #10b981; font-weight: bold; }
        .fail { color: #ef4444; font-weight: bold; }
        .info { color: #3b82f6; }
        button {
            background: #10b981;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            margin: 10px 5px;
            font-size: 14px;
            font-weight: 500;
        }
        button:hover { background: #059669; }
        button.secondary {
            background: #3b82f6;
        }
        button.secondary:hover { background: #2563eb; }
        button.danger {
            background: #ef4444;
        }
        button.danger:hover { background: #dc2626; }
        pre {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            border: 1px solid #404040;
            font-size: 12px;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-left: 4px solid #404040;
        }
        .test-result.pass { border-left-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .test-result.fail { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .console-log {
            background: #1a1a1a;
            padding: 10px;
            margin: 5px 0;
            border-left: 3px solid #3b82f6;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>🧪 Budget App Migration Test Suite</h1>
    <p class="info">This page tests the migration from legacy budget structure to the new two-tier architecture.</p>

    <div class="section">
        <h2>Step 1: Setup Legacy Data</h2>
        <button onclick="setupLegacyData()">Setup Legacy Test Data</button>
        <button class="danger" onclick="clearAllData()">Clear All Data</button>
        <div id="setup-result"></div>
    </div>

    <div class="section">
        <h2>Step 2: Load App & Trigger Migration</h2>
        <button class="secondary" onclick="window.location.href='index.html'">Open App (Triggers Migration)</button>
        <p class="info">Or manually run migration test below:</p>
        <button onclick="runMigrationTest()">Run Migration Test</button>
        <div id="migration-result"></div>
    </div>

    <div class="section">
        <h2>Step 3: Verification Results</h2>
        <button onclick="runVerification()">Run Full Verification</button>
        <div id="verification-result"></div>
    </div>

    <div class="section">
        <h2>Step 4: Console Logs</h2>
        <button onclick="captureLogs()">Capture Console Logs</button>
        <div id="console-logs"></div>
    </div>

    <script>
        const logs = [];

        // Capture console.log
        const originalLog = console.log;
        console.log = function(...args) {
            logs.push(args.join(' '));
            originalLog.apply(console, args);
        };

        function setupLegacyData() {
            // Create comprehensive legacy data structure
            const legacyData = {
                transactions: [
                    {
                        id: 1710000000000,
                        type: 'expense',
                        amount: 150.50,
                        date: '2026-03-01',
                        desc: 'Groceries',
                        mainCategory: 'Food',
                        subCategory: 'Supermarket',
                        excluded: false
                    },
                    {
                        id: 1710000000001,
                        type: 'income',
                        amount: 5000,
                        date: '2026-03-01',
                        desc: 'Salary',
                        mainCategory: 'Income',
                        subCategory: 'Salary',
                        excluded: false
                    }
                ],
                expenseCategories: {
                    "Income": ["Salary", "Freelance", "Investments"],
                    "Food": ["Groceries", "Restaurants"],
                    "Bills": ["Rent", "Utilities", "Internet"],
                    "Transport": ["Gas", "Public Transit"],
                    "Personal": ["Subscriptions", "Phone"],
                    "Household": ["Supplies", "Maintenance"]
                },
                monthlyBudgets: {
                    "2026-03": {
                        "Income": {
                            "Salary": 5000,
                            "Freelance": 1000
                        },
                        "Food": {
                            "Groceries": 500,
                            "Restaurants": 200
                        },
                        "Bills": {
                            "Rent": 1500,
                            "Utilities": 150,
                            "Internet": 60
                        },
                        "Transport": {
                            "Gas": 200,
                            "Public Transit": 100
                        }
                    },
                    "2026-02": {
                        "Income": {
                            "Salary": 5000
                        },
                        "Food": {
                            "Groceries": 450
                        },
                        "Bills": {
                            "Rent": 1500
                        }
                    }
                },
                walletAccounts: [
                    {
                        id: 'acc-1',
                        name: 'Checking',
                        type: 'spending',
                        icon: '💳',
                        colour: '#10b981',
                        balance: 2500,
                        goal: 0,
                        isDefault: true,
                        createdAt: '2026-01-01T00:00:00Z'
                    }
                ],
                itemIcons: {
                    "Food:Groceries": "🛒",
                    "Food:Restaurants": "🍽️",
                    "Bills:Rent": "🏠"
                }
            };

            localStorage.setItem('budgetAppData', JSON.stringify(legacyData));

            const result = document.getElementById('setup-result');
            result.innerHTML = `
                <div class="test-result pass">
                    <p class="pass">✓ Legacy data setup complete!</p>
                    <p>Created test data with:</p>
                    <ul>
                        <li>2 transactions (1 income, 1 expense)</li>
                        <li>6 expense categories with subcategories</li>
                        <li>2 months of budget data (Mar 2026, Feb 2026)</li>
                        <li>Total budget items: ${Object.keys(legacyData.monthlyBudgets['2026-03']).reduce((sum, cat) => sum + Object.keys(legacyData.monthlyBudgets['2026-03'][cat]).length, 0)} items in Mar 2026</li>
                        <li>1 wallet account</li>
                    </ul>
                    <details>
                        <summary>View Legacy Data Structure</summary>
                        <pre>${JSON.stringify(legacyData, null, 2)}</pre>
                    </details>
                </div>
            `;
        }

        function clearAllData() {
            localStorage.clear();
            const result = document.getElementById('setup-result');
            result.innerHTML = `<div class="test-result pass"><p class="pass">✓ All localStorage data cleared</p></div>`;
        }

        function runMigrationTest() {
            // Load the state.js file content and simulate migration
            const result = document.getElementById('migration-result');
            result.innerHTML = '<p class="info">Loading state.js and running migration...</p>';

            // Load state.js
            const script = document.createElement('script');
            script.src = 'js/state.js';
            script.onload = function() {
                result.innerHTML = `
                    <div class="test-result pass">
                        <p class="pass">✓ state.js loaded successfully</p>
                        <p>Migration logs should appear in console and "Step 4: Console Logs" section</p>
                        <p class="info">Now run verification to check results!</p>
                    </div>
                `;
            };
            script.onerror = function() {
                result.innerHTML = `
                    <div class="test-result fail">
                        <p class="fail">✗ Failed to load state.js</p>
                        <p>Make sure the file exists at js/state.js</p>
                    </div>
                `;
            };
            document.head.appendChild(script);
        }

        function runVerification() {
            const result = document.getElementById('verification-result');
            let html = '<h3>Verification Results:</h3>';
            let allPassed = true;

            try {
                // Get data from localStorage
                const stored = localStorage.getItem('budgetAppData');
                if (!stored) {
                    html += '<div class="test-result fail"><p class="fail">✗ No data in localStorage</p></div>';
                    result.innerHTML = html;
                    return;
                }

                const data = JSON.parse(stored);

                // Test 1: Check _dataVersion
                const test1 = data._dataVersion === 1;
                html += `
                    <div class="test-result ${test1 ? 'pass' : 'fail'}">
                        <strong>${test1 ? '✓' : '✗'} Test 1: _dataVersion = 1</strong>
                        <p>Expected: 1, Got: ${data._dataVersion}</p>
                    </div>
                `;
                allPassed = allPassed && test1;

                // Test 2: Check masterSections exists and populated
                const test2 = data.masterSections && Object.keys(data.masterSections).length > 0;
                html += `
                    <div class="test-result ${test2 ? 'pass' : 'fail'}">
                        <strong>${test2 ? '✓' : '✗'} Test 2: masterSections populated</strong>
                        <p>Sections found: ${data.masterSections ? Object.keys(data.masterSections).join(', ') : 'none'}</p>
                        <p>Total sections: ${data.masterSections ? Object.keys(data.masterSections).length : 0}</p>
                    </div>
                `;
                allPassed = allPassed && test2;

                // Test 3: Check masterSectionOrder exists
                const test3 = data.masterSectionOrder && Array.isArray(data.masterSectionOrder) && data.masterSectionOrder.length > 0;
                html += `
                    <div class="test-result ${test3 ? 'pass' : 'fail'}">
                        <strong>${test3 ? '✓' : '✗'} Test 3: masterSectionOrder is valid array</strong>
                        <p>Length: ${data.masterSectionOrder ? data.masterSectionOrder.length : 0}</p>
                        <p>Order: ${data.masterSectionOrder ? data.masterSectionOrder.join(' → ') : 'none'}</p>
                    </div>
                `;
                allPassed = allPassed && test3;

                // Test 4: Check budgetMonths structure
                const test4 = data.budgetMonths && Object.keys(data.budgetMonths).length > 0;
                html += `
                    <div class="test-result ${test4 ? 'pass' : 'fail'}">
                        <strong>${test4 ? '✓' : '✗'} Test 4: budgetMonths exists with data</strong>
                        <p>Months migrated: ${data.budgetMonths ? Object.keys(data.budgetMonths).join(', ') : 'none'}</p>
                        <p>Total months: ${data.budgetMonths ? Object.keys(data.budgetMonths).length : 0}</p>
                    </div>
                `;
                allPassed = allPassed && test4;

                // Test 5: Check month structure (activeSections, sectionOrder, budgets)
                if (data.budgetMonths && data.budgetMonths['2026-03']) {
                    const month = data.budgetMonths['2026-03'];
                    const test5a = month.activeSections && typeof month.activeSections === 'object';
                    const test5b = month.sectionOrder && Array.isArray(month.sectionOrder);
                    const test5c = month.budgets && typeof month.budgets === 'object';
                    const test5 = test5a && test5b && test5c;

                    html += `
                        <div class="test-result ${test5 ? 'pass' : 'fail'}">
                            <strong>${test5 ? '✓' : '✗'} Test 5: March 2026 has correct structure</strong>
                            <ul>
                                <li>${test5a ? '✓' : '✗'} Has activeSections object</li>
                                <li>${test5b ? '✓' : '✗'} Has sectionOrder array</li>
                                <li>${test5c ? '✓' : '✗'} Has budgets object</li>
                            </ul>
                            <details>
                                <summary>View March 2026 Structure</summary>
                                <pre>${JSON.stringify(month, null, 2)}</pre>
                            </details>
                        </div>
                    `;
                    allPassed = allPassed && test5;

                    // Test 6: Verify budget amounts preserved
                    let amountsPreserved = true;
                    const expectedAmounts = {
                        'Income.Salary': 5000,
                        'Income.Freelance': 1000,
                        'Food.Groceries': 500,
                        'Food.Restaurants': 200,
                        'Bills.Rent': 1500,
                        'Bills.Utilities': 150,
                        'Bills.Internet': 60
                    };

                    const foundAmounts = {};
                    Object.keys(month.budgets).forEach(section => {
                        Object.keys(month.budgets[section]).forEach(category => {
                            Object.keys(month.budgets[section][category]).forEach(item => {
                                const amount = month.budgets[section][category][item].amount;
                                const key = `${section}.${category}`;
                                foundAmounts[key] = amount;
                            });
                        });
                    });

                    let amountDetails = '<ul>';
                    Object.keys(expectedAmounts).forEach(key => {
                        const expected = expectedAmounts[key];
                        const found = foundAmounts[key];
                        const match = expected === found;
                        amountsPreserved = amountsPreserved && match;
                        amountDetails += `<li>${match ? '✓' : '✗'} ${key}: Expected ${expected}, Got ${found || 'not found'}</li>`;
                    });
                    amountDetails += '</ul>';

                    html += `
                        <div class="test-result ${amountsPreserved ? 'pass' : 'fail'}">
                            <strong>${amountsPreserved ? '✓' : '✗'} Test 6: All budget amounts preserved</strong>
                            ${amountDetails}
                        </div>
                    `;
                    allPassed = allPassed && amountsPreserved;
                } else {
                    html += `
                        <div class="test-result fail">
                            <strong>✗ Test 5-6: March 2026 data not found</strong>
                        </div>
                    `;
                    allPassed = false;
                }

                // Test 7: Legacy data still exists (backward compatibility)
                const test7 = data.expenseCategories && data.monthlyBudgets;
                html += `
                    <div class="test-result ${test7 ? 'pass' : 'fail'}">
                        <strong>${test7 ? '✓' : '✗'} Test 7: Legacy data preserved for backward compatibility</strong>
                        <ul>
                            <li>${data.expenseCategories ? '✓' : '✗'} expenseCategories still exists</li>
                            <li>${data.monthlyBudgets ? '✓' : '✗'} monthlyBudgets still exists</li>
                        </ul>
                    </div>
                `;
                allPassed = allPassed && test7;

                // Summary
                html += `
                    <div class="section">
                        <h3>${allPassed ? '✅ All Tests Passed!' : '❌ Some Tests Failed'}</h3>
                        <details>
                            <summary>View Complete localStorage Data</summary>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </details>
                    </div>
                `;

            } catch (error) {
                html += `
                    <div class="test-result fail">
                        <p class="fail">✗ Error during verification: ${error.message}</p>
                        <pre>${error.stack}</pre>
                    </div>
                `;
            }

            result.innerHTML = html;
        }

        function captureLogs() {
            const logsDiv = document.getElementById('console-logs');
            if (logs.length === 0) {
                logsDiv.innerHTML = '<p class="info">No console logs captured yet. Run migration test first.</p>';
            } else {
                let html = '<h3>Captured Console Logs:</h3>';
                logs.forEach((log, i) => {
                    html += `<div class="console-log">${i + 1}. ${log}</div>`;
                });
                logsDiv.innerHTML = html;
            }
        }

        // Show initial state
        window.addEventListener('DOMContentLoaded', function() {
            const stored = localStorage.getItem('budgetAppData');
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    if (data._dataVersion === 1) {
                        const setupDiv = document.getElementById('setup-result');
                        setupDiv.innerHTML = `
                            <div class="test-result info">
                                <p class="info">ℹ️ Data already migrated (_dataVersion = ${data._dataVersion})</p>
                                <p>Clear data and setup legacy data to test migration again.</p>
                            </div>
                        `;
                    }
                } catch (e) {
                    console.error('Error checking existing data:', e);
                }
            }
        });
    </script>
</body>
</html>
